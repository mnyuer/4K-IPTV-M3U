name: Sync Upstream

on:
  schedule:
    # 每天北京时间 8:00 同步 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: write-all

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/jia070310/4K-IPTV-M3U.git
          git fetch upstream

      - name: Merge upstream changes
        run: |
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories || true
          if [ -f .git/MERGE_MSG ]; then
            echo "冲突，使用上游版本"
            git merge --abort
            git reset --hard upstream/main
          fi

      - name: Generate merged iptv.m3u
        run: |
          # 取第一个文件的 #EXTM3U 头
          first=$(ls m3u/*.m3u | head -1)
          head -1 "$first" > iptv.m3u
          # 合并所有文件（跳过各自的 #EXTM3U 头）
          tail -q -n+2 m3u/*.m3u >> iptv.m3u
          echo "Generated iptv.m3u: $(wc -l < iptv.m3u) lines"

      - name: Commit and push
        run: |
          git add iptv.m3u
          if ! git diff --staged --quiet; then
            git commit -m "chore: update merged iptv.m3u"
          fi
          git push origin main
