name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: write-all

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/jia070310/4K-IPTV-M3U.git
          git fetch upstream

      - name: Merge upstream changes
        run: |
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories || true
          if [ -f .git/MERGE_MSG ]; then
            echo "冲突，使用上游版本"
            git merge --abort
            git reset --hard upstream/main
          fi

      - name: Generate merged iptv files
        run: python3 scripts/merge_m3u.py

      - name: Commit and push
        run: |
          git add iptv.m3u iptv_telecom.m3u iptv_unicom.m3u
          if ! git diff --staged --quiet; then
            git commit -m "chore: update merged iptv files"
          fi
          git push origin main
